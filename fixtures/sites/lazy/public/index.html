<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lazy Fixture</title>
  </head>
  <body>
    <main>
      <h1>Lazy Fixture</h1>
      <p>Scaffold for delayed and scroll-triggered assets in future milestones.</p>
      <img loading="lazy" src="/assets/lazy-placeholder.svg" alt="Local lazy placeholder">
      <template id="delayed-asset">
        <img src="/assets/delayed-placeholder.svg" alt="Local delayed placeholder">
      </template>
    </main>
  </body>
</html>
