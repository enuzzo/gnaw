name: Gnaw
options:
  bundleIdPrefix: dev.gnaw
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
  configs:
    Release:
      ARCHS: "arm64 x86_64"
      ONLY_ACTIVE_ARCH: NO
configs:
  Debug: debug
  Release: release
targets:
  Gnaw:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.gnaw.app
        PRODUCT_NAME: Gnaw
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
  GnawTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Gnaw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.gnaw.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
schemes:
  Gnaw:
    build:
      targets:
        Gnaw: all
        GnawTests: [test]
    run:
      config: Debug
      environmentVariables:
        GNAW_PROJECT_ROOT: "$(SRCROOT)/../.."
    test:
      config: Debug
      targets:
        - GnawTests
